name: Deploy to Plesk (crm.cargas.io)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DEPLOY_PATH: /var/www/vhosts/cargas.io/crm.cargas.io/app
  APP_PORT: 3018
  APP_NAME: crm-cargas
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Create deployment archive
        run: |
          mkdir -p public
          tar -czf deploy.tar.gz \
            .next \
            public \
            package.json \
            package-lock.json \
            next.config.js \
            node_modules

      - name: Copy archive to Plesk server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.PLESK_USER }}
          key: ${{ secrets.PLESK_SSH_KEY }}
          port: ${{ secrets.PLESK_SSH_PORT || 22 }}
          source: "deploy.tar.gz"
          target: "${{ env.DEPLOY_PATH }}"

      - name: Extract and restart app on Plesk
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.PLESK_USER }}
          key: ${{ secrets.PLESK_SSH_KEY }}
          port: ${{ secrets.PLESK_SSH_PORT || 22 }}
          script: |
            set -e
            cd ${{ env.DEPLOY_PATH }}

            # Backup previous build
            if [ -d .next ]; then
              rm -rf .next.bak
              mv .next .next.bak || true
            fi

            # Extract new build
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz

            # Ensure PM2 is available
            if ! command -v pm2 &> /dev/null; then
              npm install -g pm2
            fi

            # Start or reload the app on port ${{ env.APP_PORT }}
            if pm2 describe ${{ env.APP_NAME }} > /dev/null 2>&1; then
              PORT=${{ env.APP_PORT }} pm2 reload ${{ env.APP_NAME }} --update-env
            else
              PORT=${{ env.APP_PORT }} pm2 start npm --name ${{ env.APP_NAME }} -- start
            fi

            pm2 save

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.PLESK_USER }}
          key: ${{ secrets.PLESK_SSH_KEY }}
          port: ${{ secrets.PLESK_SSH_PORT || 22 }}
          script: |
            sleep 5
            curl -fsS http://127.0.0.1:${{ env.APP_PORT }} > /dev/null && echo "App is up on port ${{ env.APP_PORT }}" || (echo "Health check failed"; pm2 logs ${{ env.APP_NAME }} --lines 50 --nostream; exit 1)
